<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anthony Saieva — Resume</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Fallback minimal styling if styles.css fails to load */
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #fff;
    }
    #app {
      max-width: 820px;
      margin: 2rem auto;
      padding: 1rem;
    }
  </style>
</head>

<body>
  <article id="app" class="markdown-body"></article>

  <!-- Load marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function () {
      try {
        const res = await fetch('resume.md');
        const md = await res.text();
        const html = marked.parse(md, { mangle: false, headerIds: true });
        document.getElementById('app').innerHTML = html;
      } catch (e) {
        document.getElementById('app').innerHTML = '<p>Failed to load resume.md</p>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
